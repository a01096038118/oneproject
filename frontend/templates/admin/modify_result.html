<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    {% include 'include/title.html' %}

    <link href="{{ url_for('static', filename='css/common.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/member/member.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/member/modify.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/admin/list.css') }}" rel="stylesheet">

    <script src="{{ url_for('static', filename='js/member.js') }}"></script>
</head>
<body>
    
    {% include 'include/header.html' %}
    {% include 'include/nav.html' %}

    <article id="modify_wrap">
        <div class="modify_form">
            {% if result == 'MODIFY SUCCESS!!' %}
                <h3>MODIFY SUCCESS!!</h3>
                <p>회원 정보가 정상적으로 수정되었습니다.</p>

            {% elif result %}
                <h3>MODIFY FAILED</h3>
                <p>{{ result }}</p>
            {% endif %}

            <a class="input_button_basic_130"
            href="{{ url_for('admin.member_list') }}">
                회원목록
            </a>
        </div>
    </article>

    {% include 'include/footer.html' %}

</body>
</html>
