<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    {% include 'include/title.html' %}

    <link href="{{ url_for('static', filename='css/common.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/member/member.css') }}" rel="stylesheet">

    <script src="{{ url_for('static', filename='js/member.js') }}"></script>
    
</head>
<body>
    
    {% include 'include/header.html' %}
    {% include 'include/nav.html' %}

    <article id="modify_wrap">
        
        <div class="modify_form">
            <form action="/admin/modify_confirm" name="modify_form" method="POST">
                <input class="input_basic" name="admin_key" placeholder="Input admin key">
                <input type="hidden" name="mId" value="{{ modified.mId }}">
                <input class="input_basic" type="text" value="{{ modified.mId }}" readonly disabled><br>
                <input class="input_basic" type="password" name="mPw" value="{{ modified.mPw }}"><br>
                <input class="input_basic" type="email" name="mMail" value="{{ modified.mMail }}"><br>
                <input class="input_basic" type="text" name="mPhone" value="{{ modified.mPhone }}"><br>
                <input class="input_button_basic_130" type="button" value="MODIFY" onclick="modifyForm();">
                <input class="input_button_basic_130" type="reset" value="RESET">
            </form>
        </div>

    </article>

    {% include 'include/footer.html' %}

</body>
</html>
