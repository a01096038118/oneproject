<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    {% include 'include/title.html' %}

    <link href="{{ url_for('static', filename='css/common.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/member/member.css') }}" rel="stylesheet">

    <script src="{{ url_for('static', filename='js/member.js') }}"></script>
    
</head>
<body>
    
    <div class="main-content-overlay">
        {% include 'include/header.html' %}
        {% include 'include/nav.html' %}
    </div>

    <article id="modify_wrap">
        
        <div class="admin_key_form">
            <form action="/member/memberModify_confirm" name="admin_key_form" method="POST">
                <input class="input_basic" type="text" name="admin_key" placeholder="Input admin KEY"><br>
            </form>
        </div>

        <div class="members_list">
            <h2>회원 목록</h2>
            {% if members %}
            <ul class="member-list">
                {% for member_id, member in members.items() %}
                <li class="member-item">
                    <button type="button"
                            class="member-select-button"
                            data-member-id="{{ member.mId }}"
                            data-member-pw="{{ member.mPw }}"
                            data-member-mail="{{ member.mMail }}"
                            data-member-phone="{{ member.mPhone }}"
                            onclick="selectModifyMember(this);">
                        {{ member.mId }} / {{ member.mMail }} / {{ member.mPhone }}
                    </button>
                </li>
                {% endfor %}
            </ul>
            {% else %}
            <p>등록된 회원이 없습니다.</p>
            {% endif %}
        </div>

        <div class="modify_form">
            <form action="/member/memberModify_confirm" name="modify_form" method="POST">
                <input type="hidden" id="mIdInput" name="mId" value="">
                <input class="input_basic" id="mIdText" type="text" value="" readonly disabled><br>
                <input class="input_basic" id="mPwInput" type="password" name="mPw" value="" placeholder="Input member PW"><br>
                <input class="input_basic" id="mMailInput" type="email" name="mMail" value="" placeholder="Input member MAIL"><br>
                <input class="input_basic" id="mPhoneInput" type="text" name="mPhone" value="" placeholder="Input member PHONE"><br>
                <input class="input_button_basic_130" type="button" value="MODIFY" onclick="modifyForm();">
                <input class="input_button_basic_130" type="reset" value="RESET">
            </form>
        </div>

    </article>

    {% include 'include/footer.html' %}

</body>
</html>
